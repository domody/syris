services:
  postgres:
    image: postgres:18
    container_name: syris-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: syris
      POSTGRES_PASSWORD: syris
      POSTGRES_DB: syris
    ports:
      - "5432:5432"
    volumes:
      - syris_pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U syris -d syris"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  syris_pgdata: